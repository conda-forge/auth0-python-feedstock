schema_version: 1

context:
  version: "5.8.0"

package:
  name: auth0-python
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/auth0-python/auth0_python-${{ version }}.tar.gz
  sha256: 22ae43d97fa2dedfc0ab4cef298904927bac465526b290db7196a9461fcb24ed

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-dynamic-versioning >=1.0.0,<2.0.0
    - poetry-core
    - pip
  run:
    - python >=${{ python_min }}
    - httpx >=0.21.2
    - pydantic >=1.9.2
    - pydantic-core >=2.18.2
    - typing_extensions >=4.0.0
    - aiohttp >=3.11.18
    - cryptography >=44.0.0
    - pyjwt >=2.8.0
    - requests >=2.32.3
    - urllib3 >=2.3.0

tests:
  - python:
      imports:
        - auth0
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Auth0 Python SDK - Management and Authentication APIs
  license: MIT
  license_file: LICENSE
  homepage: https://auth0.com

extra:
  recipe-maintainers:
    - ocefpaf
